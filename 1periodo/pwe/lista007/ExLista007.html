<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="GET">
        <fieldset>
            <legend>Formulário</legend>
            <label for="nome">Nome:</label>
            <input name="nome" id="nome" type="text">
                <br>
           
            
            <label>Sexo:</label> 
            <input type="radio" name="sexo" id="masculino" value="masculino">
            <label for="masculino">Masculino</label> 
            <input type="radio" name="sexo" id="feminino" value="feminino">
            <label for="feminino"> Feminino</label> <br>
            <label >Estado Civil:</label>
            <select>
                <option value="null">---Escolha uma opção---</option>
                <option value="Solteiro">Solteiro</option>
                <option value="Casado">Casado</option>
                <option value="viuvo">Viuvo</option>
                <option value="divorciado">Divorciado</option>
                <option value="outro">Outro</option>
            </select> 
            <br>
            <label for="">Email:</label>
            <input type="email"> <br>
            <label for="">Endereço:</label>
            <input type="text" minlength="10"> <br>
            <label for="">Número:</label>
            <input type="number" min="1" max="9999"> <br>
            <label for="">Data de Nascimento:</label>
            <input type="date"> <br>
            <label for="">Numero Para contato:</label>
            <input type="tel" name="" id=""> <br>
            <label for="">Página pessoal:</label>
            <input type="url"><br>
            <input  class="but" type="button" value="Cadastrar">
            <input class="but" type="reset" value="Limpar">


        </fieldset>
    </form>

   
    
</body>
</html>
